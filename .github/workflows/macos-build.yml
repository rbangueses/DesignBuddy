name: macOS Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-rust-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-rust-${{ runner.os }}-${{ runner.arch }}-

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:run

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build macOS app
        run: npm exec tauri build

      - name: Verify macOS app signature
        run: codesign --verify --deep --strict --verbose=4 src-tauri/target/release/bundle/macos/BanguesesDraw.app

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: BanguesesDraw-macos
          if-no-files-found: error
          path: src-tauri/target/release/bundle/**/*.dmg
